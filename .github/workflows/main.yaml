name: Tuyauterie

permissions:
  packages: write
  contents: read
  id-token: write

on:
  push:
    branches:
      - main
    tags:
      - "*"
  pull_request:
    branches:
      - main

jobs:
  build:
    uses: notarock/tuyauterie/.github/workflows/tuyauterie.yml@main
    with:
      github-event: ${{ github.event_name }}
      tuyauterie-files: '["web/.tuyauterie.yaml", ".tuyauterie.yaml"]'
    secrets:
      GITOPS_REPOSITORY_TOKEN: ${{ secrets.GITOPS_REPOSITORY_TOKEN }}
