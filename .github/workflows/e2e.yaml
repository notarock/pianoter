name: E2E Tests

on:
  push:
    branches:
      - main
    tags:
      - "*"
  pull_request:
    branches:
      - main

jobs:
  e2e:
    runs-on: ubuntu-latest

    services:
      mariadb:
        image: mariadb:12
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: pianoter
          MARIADB_USER: pianoter
          MARIADB_PASSWORD: pianoter
        ports:
          - 3306:3306
        options: >-
          --health-cmd "healthcheck.sh --connect --innodb_initialized"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # --- Go backend ---
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - name: Build backend
        run: go build -o pianoter .

      - name: Start backend
        run: ./pianoter &
        env:
          DB_HOST: 127.0.0.1

      - name: Wait for backend
        run: |
          for i in $(seq 1 30); do
            if curl -s http://localhost:8080/ > /dev/null 2>&1; then
              echo "Backend ready"; break
            fi
            echo "Waiting ($i/30)..."; sleep 2
          done

      # --- Cypress ---
      - name: Install frontend dependencies
        run: npm ci
        working-directory: web

      - name: Start frontend dev server
        run: npm run dev &
        working-directory: web

      - name: Wait for frontend
        run: |
          for i in $(seq 1 30); do
            if curl -s http://localhost:5173/ > /dev/null 2>&1; then
              echo "Frontend ready"; break
            fi
            echo "Waiting ($i/30)..."; sleep 2
          done

      - name: Run Cypress E2E tests
        uses: cypress-io/github-action@v6
        with:
          working-directory: web
          install: false
          browser: chrome
